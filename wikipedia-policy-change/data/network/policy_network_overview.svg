<svg width="100%" viewBox="0 0 680 230" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Policy core by wiki, 2026</title>
<desc>Six Wikipedia editions compared: circle size = number of core policy pages, purple bar = internal links per policy. English is both the largest core (347 pages) and the densest (19 links per policy); Dutch the sparsest (4.6).</desc>
<g class="c-teal">
<circle cx="95" cy="95" r="39"/><text class="th" x="95" y="95" text-anchor="middle" dominant-baseline="central">347</text>
<circle cx="205" cy="95" r="28"/><text class="th" x="205" y="95" text-anchor="middle" dominant-baseline="central">193</text>
<circle cx="305" cy="95" r="27"/><text class="th" x="305" y="95" text-anchor="middle" dominant-baseline="central">177</text>
<circle cx="405" cy="95" r="25"/><text class="th" x="405" y="95" text-anchor="middle" dominant-baseline="central">149</text>
<circle cx="505" cy="95" r="25"/><text class="th" x="505" y="95" text-anchor="middle" dominant-baseline="central">148</text>
<circle cx="605" cy="95" r="23"/><text class="th" x="605" y="95" text-anchor="middle" dominant-baseline="central">129</text>
</g>
<text class="t" x="95"  y="152" text-anchor="middle">en</text>
<text class="t" x="205" y="152" text-anchor="middle">ja</text>
<text class="t" x="305" y="152" text-anchor="middle">fr</text>
<text class="t" x="405" y="152" text-anchor="middle">de</text>
<text class="t" x="505" y="152" text-anchor="middle">es</text>
<text class="t" x="605" y="152" text-anchor="middle">nl</text>
<rect class="c-purple" x="45"  y="164" width="100" height="8" rx="2"/>
<rect class="c-purple" x="181" y="164" width="48"  height="8" rx="2"/>
<rect class="c-purple" x="282" y="164" width="46"  height="8" rx="2"/>
<rect class="c-purple" x="386" y="164" width="39"  height="8" rx="2"/>
<rect class="c-purple" x="487" y="164" width="36"  height="8" rx="2"/>
<rect class="c-purple" x="593" y="164" width="24"  height="8" rx="2"/>
<text class="ts" x="95"  y="186" text-anchor="middle">19.0</text>
<text class="ts" x="205" y="186" text-anchor="middle">9.1</text>
<text class="ts" x="305" y="186" text-anchor="middle">8.8</text>
